apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: k8s-backend
spec:
  serviceName: "mongo"
  replicas: 3

  selector:
    matchLabels:
      app: mongo

  template:
    metadata:
      labels:
        app: mongo

    spec:
      containers:
        - name: mongo
          image: mongo:4.4

          ports:
            - containerPort: 27017

          command:
            - mongod
            - "--replSet"
            - "rs0"
            - "--bind_ip_all"

          volumeMounts:
            - name: mongo-data
              mountPath: /data/db

  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes:
          - ReadWriteOnce

        storageClassName: ebs-sc   #(EBS binding)

        resources:
          requests:
            storage: 1Gi
